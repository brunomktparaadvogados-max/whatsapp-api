<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProspectFlow WhatsApp Evolution</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #162033;
      --muted: #667085;
      --line: #d8deea;
      --panel: #f6f8fb;
      --blue: #4f6fed;
      --green: #059669;
      --pink: #e95488;
      --amber: #a16207;
      --red: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: #eef2ff;
    }
    .shell {
      max-width: 1280px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
      padding: 24px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    h1, h2, h3 { margin: 0; }
    h1 { font-size: 28px; }
    h2 { font-size: 20px; margin: 24px 0 12px; }
    h3 { font-size: 18px; }
    p { margin: 6px 0; }
    .muted { color: var(--muted); }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(280px, 380px) 1fr;
      gap: 18px;
      margin-top: 20px;
    }
    .panel, .user-card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 16px;
    }
    .user-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      margin-bottom: 12px;
    }
    .session-box {
      grid-column: 1 / -1;
      border: 1px solid var(--blue);
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      min-height: 120px;
    }
    label {
      display: block;
      font-weight: 700;
      margin-top: 12px;
    }
    input {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 16px;
      background: #fff;
    }
    button {
      min-height: 42px;
      border: 0;
      border-radius: 7px;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      background: var(--blue);
      cursor: pointer;
    }
    button:disabled {
      opacity: .55;
      cursor: wait;
    }
    .secondary { background: #475467; }
    .success { background: var(--green); }
    .danger { background: var(--pink); }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      background: #e5e7eb;
    }
    .status.connected { color: #047857; background: #d1fae5; }
    .status.qr { color: var(--amber); background: #fef3c7; }
    .status.error { color: var(--red); background: #fee2e2; }
    .qr {
      display: block;
      max-width: 320px;
      width: 100%;
      margin: 14px auto 8px;
      border: 2px solid var(--blue);
      border-radius: 8px;
      background: #fff;
    }
    .notice {
      border-left: 4px solid var(--blue);
      padding: 12px;
      background: #eef4ff;
      border-radius: 6px;
      margin-top: 12px;
    }
    .error-text { color: var(--red); font-weight: 700; }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      .grid, .user-card { grid-template-columns: 1fr; }
      header { flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>WhatsApp API Evolution</h1>
        <p class="muted">ProspectFlow conectado ao motor Evolution API.</p>
      </div>
      <div class="toolbar">
        <button id="refreshBtn" class="secondary">Atualizar</button>
        <button id="logoutBtn" class="danger hidden">Sair</button>
      </div>
    </header>

    <section id="loginPanel" class="panel">
      <h2>Entrar</h2>
      <label>Email</label>
      <input id="loginEmail" type="email" autocomplete="username">
      <label>Senha</label>
      <input id="loginPassword" type="password" autocomplete="current-password">
      <div class="toolbar" style="margin-top:14px">
        <button id="loginBtn">Entrar</button>
      </div>
      <p id="loginError" class="error-text"></p>
    </section>

    <section id="appPanel" class="hidden">
      <div class="grid">
        <aside class="panel">
          <h2>Minha Sessao</h2>
          <div id="mySession"></div>
          <div class="toolbar" style="margin-top:12px">
            <button id="myQrBtn">Gerar QR agora</button>
            <button id="myDisconnectBtn" class="danger">Desconectar</button>
          </div>
          <div class="notice">
            A persistencia fica na Evolution. Se a sessao nao estiver conectada, esta tela pede QR diretamente ao motor novo.
          </div>

          <div id="adminCreateUser" class="hidden">
            <h2>Criar Usuario</h2>
            <label>Nome</label>
            <input id="newName">
            <label>Email</label>
            <input id="newEmail" type="email">
            <label>Senha</label>
            <input id="newPassword" type="password" value="123456">
            <label>Empresa</label>
            <input id="newCompany">
            <button id="createUserBtn" style="margin-top:14px">Criar Usuario</button>
          </div>
        </aside>

        <section>
          <div class="toolbar" style="justify-content:space-between">
            <h2>Usuarios</h2>
            <div class="toolbar">
              <button id="exportUsersBtn" class="secondary">Exportar nomes/emails</button>
              <button id="resetSessionsBtn" class="danger">Resetar sessoes WhatsApp</button>
            </div>
          </div>
          <div id="usersList" class="panel">Carregando...</div>
        </section>
      </div>
    </section>
  </main>

  <script>
    const API_URL = window.location.origin;
    let token = localStorage.getItem('token') || '';
    let currentUser = JSON.parse(localStorage.getItem('user') || 'null');
    const openPanels = new Set();
    const pollers = new Map();

    const $ = (id) => document.getElementById(id);

    function apiHeaders(json = false) {
      return {
        ...(json ? { 'Content-Type': 'application/json' } : {}),
        ...(token ? { Authorization: `Bearer ${token}` } : {})
      };
    }

    async function readJson(response) {
      const text = await response.text();
      try {
        return text ? JSON.parse(text) : {};
      } catch (error) {
        throw new Error(`Resposta nao-JSON da API (${response.status}): ${text.slice(0, 120)}`);
      }
    }

    async function api(path, options = {}) {
      const response = await fetch(`${API_URL}${path}`, {
        ...options,
        headers: { ...apiHeaders(!!options.body), ...(options.headers || {}) }
      });
      const data = await readJson(response);
      if (!response.ok || data.success === false) {
        throw new Error(data.error || data.message || `HTTP ${response.status}`);
      }
      return data;
    }

    function statusLabel(status) {
      const map = {
        connected: 'Conectado',
        qr_code: 'Aguardando QR Code',
        initializing: 'Inicializando',
        authenticated: 'Autenticando',
        disconnected: 'Desconectado',
        failed: 'Falha',
        auth_failure: 'Falha na autenticacao',
        not_created: 'Nao criada',
        unknown: 'Consultando'
      };
      return map[status] || status || 'Consultando';
    }

    function statusClass(status) {
      if (status === 'connected') return 'connected';
      if (status === 'qr_code' || status === 'initializing' || status === 'authenticated') return 'qr';
      return 'error';
    }

    function renderSession(target, session, userId = null) {
      const status = session?.status || 'unknown';
      const qr = session?.qrCode || session?.qr_code || null;
      const sessionId = session?.id || (userId ? `user_${userId}` : `user_${currentUser?.id}`);
      target.innerHTML = `
        <p><strong>Instancia:</strong> ${session?.instanceName || sessionId}</p>
        <span class="status ${statusClass(status)}">${statusLabel(status)}</span>
        ${status === 'connected' ? '<p class="notice">Pronto para disparar.</p>' : ''}
        ${qr && status !== 'connected' ? `<img class="qr" src="${qr}" alt="QR Code">` : ''}
        ${status !== 'connected' && !qr ? '<p class="muted">Pedindo QR para a Evolution...</p>' : ''}
      `;
    }

    function stopPoll(userId) {
      const existing = pollers.get(userId);
      if (existing) clearTimeout(existing);
      pollers.delete(userId);
    }

    function schedulePoll(userId) {
      stopPoll(userId);
      pollers.set(userId, setTimeout(() => loadUserSession(userId, false), 2500));
    }

    async function loadMe() {
      if (!token) return showLogin();
      try {
        const data = await api('/api/auth/me');
        currentUser = data.user;
        localStorage.setItem('user', JSON.stringify(currentUser));
        showApp();
        renderSession($('mySession'), data.session);
        await loadUsers();
      } catch (error) {
        showLogin(error.message);
      }
    }

    function showLogin(message = '') {
      token = '';
      currentUser = null;
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      $('loginPanel').classList.remove('hidden');
      $('appPanel').classList.add('hidden');
      $('logoutBtn').classList.add('hidden');
      $('loginError').textContent = message;
    }

    function showApp() {
      $('loginPanel').classList.add('hidden');
      $('appPanel').classList.remove('hidden');
      $('logoutBtn').classList.remove('hidden');
      $('adminCreateUser').classList.toggle('hidden', currentUser?.email !== 'admin@flow.com');
    }

    async function login() {
      $('loginError').textContent = '';
      $('loginBtn').disabled = true;
      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email: $('loginEmail').value, password: $('loginPassword').value })
        });
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify(currentUser));
        await loadMe();
      } catch (error) {
        $('loginError').textContent = error.message;
      } finally {
        $('loginBtn').disabled = false;
      }
    }

    async function loadUsers() {
      if (currentUser?.email !== 'admin@flow.com') {
        $('usersList').innerHTML = '<p class="muted">Area de usuarios disponivel apenas para admin.</p>';
        return;
      }
      const data = await api('/api/users');
      $('usersList').innerHTML = data.users.map(user => `
        <article class="user-card" id="user-${user.id}">
          <div>
            <h3>${user.name}</h3>
            <p>${user.email}</p>
            <p class="muted">Criado em: ${new Date(user.created_at).toLocaleDateString('pt-BR')}</p>
          </div>
          <div class="toolbar">
            <button onclick="toggleUser(${user.id})">Sessao</button>
            <button class="success" onclick="loadUserSession(${user.id}, true, true)">Gerar QR</button>
            <button class="danger" onclick="deleteUser(${user.id}, '${String(user.name).replace(/'/g, "\\'")}')">Deletar</button>
          </div>
          <div class="session-box hidden" id="session-${user.id}"></div>
        </article>
      `).join('');
      for (const id of [...openPanels]) loadUserSession(id, false);
    }

    async function toggleUser(userId) {
      const box = $(`session-${userId}`);
      const opening = box.classList.contains('hidden');
      box.classList.toggle('hidden', !opening);
      if (opening) {
        openPanels.add(userId);
        await loadUserSession(userId, true, false);
      } else {
        openPanels.delete(userId);
        stopPoll(userId);
      }
    }

    async function loadUserSession(userId, activate, forceQr = false) {
      const box = $(`session-${userId}`);
      if (!box || box.classList.contains('hidden')) return;
      const sessionId = `user_${userId}`;
      if (activate) {
        box.innerHTML = '<p class="muted">Pedindo QR/conexao para a Evolution...</p>';
      }
      try {
        const path = activate
          ? `/api/sessions/${sessionId}/qr?waitMs=8000&forceQr=${forceQr ? 'true' : 'false'}`
          : `/api/sessions/${sessionId}?activate=true&waitMs=3000`;
        const data = await api(path);
        const session = data.session || data;
        renderSession(box, session, userId);
        box.insertAdjacentHTML('beforeend', `
          <div class="toolbar">
            <button onclick="loadUserSession(${userId}, true, true)">Gerar QR agora</button>
            <button class="danger" onclick="disconnectSession('${sessionId}', ${userId})">Desconectar</button>
          </div>
        `);
        if (session.status !== 'connected') schedulePoll(userId);
      } catch (error) {
        box.innerHTML = `<p class="error-text">${error.message}</p><button onclick="loadUserSession(${userId}, true, true)">Tentar novamente</button>`;
        schedulePoll(userId);
      }
    }

    async function generateMyQr() {
      $('myQrBtn').disabled = true;
      try {
        const data = await api('/api/my-qr?waitMs=8000&forceQr=true');
        renderSession($('mySession'), data.session || data);
      } finally {
        $('myQrBtn').disabled = false;
      }
    }

    async function disconnectSession(sessionId, userId = null) {
      await api(`/api/sessions/${sessionId}`, { method: 'DELETE' });
      if (userId) await loadUserSession(userId, true, true);
      if (currentUser && sessionId === `user_${currentUser.id}`) await generateMyQr();
    }

    async function createUser() {
      await api('/api/auth/register', {
        method: 'POST',
        body: JSON.stringify({
          name: $('newName').value,
          email: $('newEmail').value,
          password: $('newPassword').value,
          company: $('newCompany').value || null
        })
      });
      $('newName').value = '';
      $('newEmail').value = '';
      $('newPassword').value = '123456';
      $('newCompany').value = '';
      await loadUsers();
    }

    async function deleteUser(userId, name) {
      if (!confirm(`Deletar ${name}?`)) return;
      await api(`/api/users/${userId}`, { method: 'DELETE' });
      openPanels.delete(userId);
      await loadUsers();
    }

    async function exportUsers() {
      const data = await api('/api/admin/users-export');
      const text = data.users.map(u => `${u.name};${u.email};${u.company || ''}`).join('\n');
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'usuarios-prospectflow.txt';
      link.click();
      URL.revokeObjectURL(link.href);
    }

    async function resetSessions() {
      if (!confirm('Resetar todas as instancias WhatsApp na Evolution e remover cache antigo?')) return;
      await api('/api/admin/reset-whatsapp-sessions', { method: 'POST' });
      await loadUsers();
    }

    $('loginBtn').addEventListener('click', login);
    $('logoutBtn').addEventListener('click', () => showLogin());
    $('refreshBtn').addEventListener('click', loadMe);
    $('myQrBtn').addEventListener('click', generateMyQr);
    $('myDisconnectBtn').addEventListener('click', () => disconnectSession(`user_${currentUser.id}`));
    $('createUserBtn').addEventListener('click', createUser);
    $('exportUsersBtn').addEventListener('click', exportUsers);
    $('resetSessionsBtn').addEventListener('click', resetSessions);

    loadMe();
  </script>
</body>
</html>
