version: '3.8'

services:
  prospectflow-whatsapp-api:
    build: .
    container_name: prospectflow-whatsapp-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_WEBHOOK_URL: ${EVOLUTION_WEBHOOK_URL:-http://prospectflow-whatsapp-api:3000/api/webhooks/evolution}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET:-}
      EVOLUTION_INSTANCE_PREFIX: ${EVOLUTION_INSTANCE_PREFIX:-pf}
      EVOLUTION_SEND_DELAY_MS: ${EVOLUTION_SEND_DELAY_MS:-1200}
      WWEBJS_AUTH_PATH: /app/.wwebjs_auth
      WWEBJS_MAX_SESSIONS: ${WWEBJS_MAX_SESSIONS:-4}
      WWEBJS_SEND_TIMEOUT_MS: ${WWEBJS_SEND_TIMEOUT_MS:-45000}
      EVOGO_BASE_URL: http://evolution-go:4000
      EVOGO_GLOBAL_API_KEY: ${EVOGO_GLOBAL_API_KEY:-prospectflow-go-local-key-change-me}
      EVOGO_INSTANCE_PREFIX: ${EVOGO_INSTANCE_PREFIX:-pfgo}
      EVOGO_TIMEOUT_MS: ${EVOGO_TIMEOUT_MS:-45000}
    volumes:
      - wwebjs-auth-data:/app/.wwebjs_auth
    depends_on:
      - evolution-api
      - evolution-go
    restart: unless-stopped

  evolution-go:
    image: evoapicloud/evolution-go:latest
    container_name: evolution-go
    ports:
      - "4000:4000"
    environment:
      SERVER_PORT: 4000
      CLIENT_NAME: prospectflow
      GLOBAL_API_KEY: ${EVOGO_GLOBAL_API_KEY:-prospectflow-go-local-key-change-me}
      POSTGRES_AUTH_DB: postgresql://postgres:postgres@evolution-go-postgres:5432/evogo_auth?sslmode=disable
      POSTGRES_USERS_DB: postgresql://postgres:postgres@evolution-go-postgres:5432/evogo_users?sslmode=disable
      DATABASE_SAVE_MESSAGES: "false"
      WADEBUG: INFO
      LOGTYPE: console
      CONNECT_ON_STARTUP: "false"
      WEBHOOK_FILES: "true"
    volumes:
      - evolution-go-data:/app/dbdata
      - evolution-go-logs:/app/logs
    depends_on:
      - evolution-go-postgres
    mem_limit: 1g
    restart: unless-stopped

  evolution-go-postgres:
    image: postgres:15-alpine
    container_name: evolution-go-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - evolution-go-postgres-data:/var/lib/postgresql/data
      - ./scripts/evolution-go-init.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${EVOLUTION_PUBLIC_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgres://evolution:evolution@evolution-postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/0
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      LOG_LEVEL: ERROR,WARN,INFO
    depends_on:
      - evolution-postgres
      - evolution-redis
    restart: unless-stopped

  evolution-postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - evolution-redis-data:/data
    restart: unless-stopped

volumes:
  evolution-postgres-data:
  evolution-redis-data:
  wwebjs-auth-data:
  evolution-go-data:
  evolution-go-logs:
  evolution-go-postgres-data:
